<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="teal" data-font="nunito">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Buzzend · Notifications</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/tokens.css" />
  <link rel="stylesheet" href="../../css/palettes.css" />
  <link rel="stylesheet" href="../../css/fonts.css" />
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../../css/screens/notifications.css" />
</head>
<body>
  <div class="state-switch">
    <button data-v="1" onclick="setV('1')">List</button>
    <button data-v="2" onclick="setV('2')">Tabbed</button>
    <button data-v="empty" onclick="setV('empty')">Empty</button>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" style="top:64px">🌙</button>

  <div class="screen-box">
    <div class="screen">
      <div class="statusbar"><span>9:41</span><span>5G&nbsp;&nbsp;·&nbsp;&nbsp;100%</span></div>
      <div class="nf-header">
        <button class="nf-back"><i data-icon="chevron" data-size="22"></i></button>
        <div class="nf-title">Notifications</div>
        <button class="nf-markall">Mark all read</button>
      </div>
      <div class="scroll nf-content" id="content"></div>
    </div>
  </div>

  <script src="../../js/components/icons.js"></script>
  <script src="../../js/screens/notifications.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    function render(v) {
      document.getElementById("content").innerHTML = Notif.render(v);
      window.Icons.init(document.getElementById("content"));
      document.querySelector(".nf-markall").style.display = v === "empty" ? "none" : "";
      document.querySelectorAll(".state-switch button").forEach(b => b.classList.toggle("active", b.dataset.v === v));
    }
    function setV(v) { render(v); }
    render(new URLSearchParams(location.search).get("v") || "1");
  </script>
</body>
</html>
