<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="teal" data-font="nunito">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Buzzend · Splash</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/tokens.css" />
  <link rel="stylesheet" href="../../css/palettes.css" />
  <link rel="stylesheet" href="../../css/fonts.css" />
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../../css/screens/onboarding.css" />
</head>
<body>
  <div class="state-switch">
    <button data-v="1" onclick="setV('1')">Minimal</button>
    <button data-v="2" onclick="setV('2')">Gradient</button>
    <button data-v="3" onclick="setV('3')">Dark</button>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" style="top:64px">🌙</button>

  <div class="screen-box"><div class="screen"><div id="stage"></div></div></div>

  <script src="../../js/components/icons.js"></script>
  <script src="../../js/screens/onboarding.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    function render(v) {
      const el = document.getElementById("stage");
      el.className = ""; el.innerHTML = "";
      OB.splash(v, el);
      document.querySelectorAll(".state-switch button").forEach(b => b.classList.toggle("active", b.dataset.v === v));
    }
    function setV(v) { render(v); }
    render(new URLSearchParams(location.search).get("v") || "1");
  </script>
</body>
</html>
