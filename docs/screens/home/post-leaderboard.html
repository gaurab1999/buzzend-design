<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="teal" data-font="nunito">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Buzzend · Post / Feed Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/tokens.css" />
  <link rel="stylesheet" href="../../css/palettes.css" />
  <link rel="stylesheet" href="../../css/fonts.css" />
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../../css/screens/home.css" />
  <link rel="stylesheet" href="../../css/screens/home-pro.css" />
  <link rel="stylesheet" href="../../css/screens/challenges.css" />
  <link rel="stylesheet" href="../../css/screens/post-leaderboard.css" />
</head>
<body>
  <!-- primary screen switch -->
  <div class="state-switch">
    <button data-v="feed"        onclick="PostLB.go('feed')">Feed</button>
    <button data-v="beatit"      onclick="PostLB.go('beatit')">Beat it</button>
    <button data-v="leaderboard" onclick="PostLB.go('leaderboard')">Leaderboard</button>
    <button data-v="video"       onclick="PostLB.go('video')">Video</button>
  </div>

  <!-- sub-switch: leaderboard case (a–g, non-owner viewer) -->
  <div class="state-switch" data-sub="lb" style="top:60px;display:none;padding:6px 10px">
    <select id="lbCase" onchange="PostLB.setCase(this.value)"
      style="border:none;background:none;font:800 12px var(--font);color:var(--text-primary);cursor:pointer;outline:none">
      <option value="a">a · Owner only — 1st attempt</option>
      <option value="aN">a′ · Owner only — replayed</option>
      <option value="open3">d · Podium slot open — not attempted</option>
      <option value="full">c · Top-3 full — not attempted</option>
      <option value="podium">e · You on podium (#2)</option>
      <option value="outside">f · You outside top-3 (#5)</option>
      <option value="leader">g · You lead (#1)</option>
      <option value="ended">🏁 Challenge ended</option>
    </select>
  </div>
  <!-- sub-switch: beat-it — target state -->
  <div class="state-switch" data-sub="bi" style="top:60px;display:none">
    <button data-bi="beaten" onclick="PostLB.setBiMode('beaten')">Someone beat it</button>
    <button data-bi="single" onclick="PostLB.setBiMode('single')">Not beaten yet</button>
    <button data-bi="ended"  onclick="PostLB.setBiMode('ended')">Ended</button>
  </div>

  <button class="theme-toggle" onclick="toggleTheme(); PostLB.render()" style="top:64px">🌙</button>

  <div class="screen-box">
    <div class="screen">
      <div class="statusbar" id="sb"><span>9:41</span><span>5G&nbsp;&nbsp;·&nbsp;&nbsp;100%</span></div>
      <div id="app"></div>
    </div>
  </div>

  <script src="../../js/components/dialog.js"></script>
  <script src="../../js/components/icons.js"></script>
  <script src="../../js/screens/social-data.js"></script>
  <script src="../../js/screens/post-leaderboard.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const _q = new URLSearchParams(location.search);
    PostLB.start(document.getElementById("app"), _q.get("v") || "feed");
    if (_q.get("case")) PostLB.setCase(_q.get("case"));
    if (_q.get("bi")) PostLB.setBiMode(_q.get("bi"));
    if (_q.get("tab")) PostLB.lbTab(_q.get("tab"));
  </script>
</body>
</html>
