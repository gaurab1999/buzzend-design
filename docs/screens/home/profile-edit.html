<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="teal" data-font="nunito">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Buzzend · Edit profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/tokens.css" />
  <link rel="stylesheet" href="../../css/palettes.css" />
  <link rel="stylesheet" href="../../css/fonts.css" />
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../../css/screens/home.css" />
  <link rel="stylesheet" href="../../css/screens/profile.css" />
  <link rel="stylesheet" href="../../css/screens/profile-edit.css" />
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme(); ProfileEdit.start(document.getElementById('content'))">🌙</button>

  <div class="screen-box">
    <div class="screen">
      <div class="statusbar"><span>9:41</span><span>5G&nbsp;&nbsp;·&nbsp;&nbsp;100%</span></div>
      <div class="ed-top">
        <button class="pf-navb" style="box-shadow:none;border:1px solid var(--border)" onclick="location.href='profile.html'"><i data-icon="x" data-size="18"></i></button>
        <div class="ed-title">Edit profile</div>
        <button class="ed-save" onclick="ProfileEdit.save()">Save</button>
      </div>
      <div class="scroll" id="content" style="padding:0 0 40px"></div>
    </div>
  </div>

  <script src="../../js/components/dialog.js"></script>
  <script src="../../js/components/icons.js"></script>
  <script src="../../js/screens/social-data.js"></script>
  <script src="../../js/screens/profile.js"></script>
  <script src="../../js/screens/profile-edit.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    window.Icons.init(document.querySelector(".ed-top"));
    ProfileEdit.start(document.getElementById("content"));
  </script>
</body>
</html>
