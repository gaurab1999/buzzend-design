<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="teal" data-font="nunito">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Buzzend · Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/tokens.css" />
  <link rel="stylesheet" href="../../css/palettes.css" />
  <link rel="stylesheet" href="../../css/fonts.css" />
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../../css/screens/home.css" />
  <link rel="stylesheet" href="../../css/screens/settings.css" />
</head>
<body>
  <div class="state-switch">
    <button data-v="google" onclick="setV('google')">Google</button>
    <button data-v="phone" onclick="setV('phone')">Phone</button>
    <button data-v="apple" onclick="setV('apple')">Apple</button>
  </div>
  <button class="theme-toggle" onclick="toggleTheme(); if(window.Settings) Settings.renderBody()" style="top:64px">🌙</button>

  <div class="screen-box">
    <div class="screen">
      <div class="statusbar" style="color:#fff;background:var(--primary)"><span>9:41</span><span>5G&nbsp;&nbsp;·&nbsp;&nbsp;100%</span></div>
      <div id="sthead"></div>
      <div class="scroll" id="content"></div>
    </div>
  </div>

  <script src="../../js/components/dialog.js"></script>
  <script src="../../js/components/icons.js"></script>
  <script src="../../js/screens/social-data.js"></script>
  <script src="../../js/screens/settings.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const _p = new URLSearchParams(location.search);
    function setV(v) {
      document.getElementById("content").innerHTML = Settings.init(v);
      document.getElementById("sthead").innerHTML = Settings.hero();
      window.Icons.init(document.querySelector(".screen"));
      document.querySelectorAll(".state-switch button").forEach(b => b.classList.toggle("active", b.dataset.v === v));
    }
    setV(_p.get("id") || _p.get("v") || "google");
    const d = _p.get("dialog");
    if (d === "steps") Settings.openSteps();
    else if (d === "height") Settings.openHeight();
    else if (d === "weight") Settings.openWeight();
    else if (d === "appearance") Settings.openAppearance();
    else if (d === "rate") Settings.openRate();
    else if (d === "share") Settings.openShare();
  </script>
</body>
</html>
