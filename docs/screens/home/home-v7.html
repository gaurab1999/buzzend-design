<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="teal" data-font="nunito">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Buzzend · Home V7 · Pulse + Momentum top</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/tokens.css" />
  <link rel="stylesheet" href="../../css/palettes.css" />
  <link rel="stylesheet" href="../../css/fonts.css" />
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../../css/screens/home.css" />
  <link rel="stylesheet" href="../../css/screens/home-pro.css" />
  <link rel="stylesheet" href="../../css/screens/community.css" />
  <style>
    /* Placement-label option variations — design comparison appended at the feed bottom. */
    .pl-sec { border-top: 10px solid var(--divider); margin-top: 10px; }
    .pl-sech { font: 900 15px var(--font); color: var(--text-primary); padding: 16px 18px 0; }
    .pl-sesub { font: 600 12px var(--font); color: var(--text-secondary); padding: 2px 18px 0; }
    .pl-opt { padding: 18px 18px 4px; }
    .pl-opt .pl-k { font: 900 11px var(--font); color: var(--primary); letter-spacing: .6px; text-transform: uppercase; }
    .pl-opt .pl-ti { font: 900 16px var(--font); margin: 2px 0; }
    .pl-opt .pl-de { font: 600 12px var(--font); color: var(--text-secondary); line-height: 1.4; }
    .pl-pills { display: inline-flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
    .pl-pill { display: inline-flex; align-items: center; gap: 4px; background: rgba(95,95,95,.10); color: var(--text-secondary); border-radius: 99px; padding: 3px 9px; font: 800 11px var(--font); }
    .pl-pill.comp { color: var(--primary); background: rgba(0,128,128,.12); }
    .pl-pill svg { vertical-align: -1px; }
    .pl-icos { display: inline-flex; align-items: center; gap: 11px; vertical-align: -3px; margin-left: 2px; }
    .pl-ico { position: relative; color: var(--primary); display: inline-flex; }
    .pl-ico.mut { color: var(--text-secondary); }
    .pl-cnt { position: absolute; right: -9px; top: -6px; font: 900 9px var(--font); color: var(--primary); }
    .pl-more { display: inline-flex; align-items: center; background: rgba(95,95,95,.12); color: var(--text-secondary); border-radius: 99px; padding: 1px 7px; font: 900 10.5px var(--font); margin-left: 5px; vertical-align: 1px; }
    .pl-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 18px 2px; }
    .pl-chip { display: inline-flex; align-items: center; gap: 6px; border: 1.5px solid var(--border); border-radius: 99px; padding: 6px 12px; font: 800 12px var(--font); color: var(--text-secondary); background: var(--surface); }
    .pl-chip.comp { color: var(--primary); border-color: rgba(0,128,128,.45); }
    .pl-chip svg { vertical-align: -2px; }

    /* Option C "+N" overflow bottom sheet */
    .pl-scrim { position: fixed; inset: 0; background: rgba(0,0,0,.42); z-index: 60; display: flex; align-items: flex-end; justify-content: center; }
    .pl-sheet { width: 100%; max-width: 460px; background: var(--surface); border-radius: 22px 22px 0 0; padding: 8px 0 22px; animation: plUp .22s ease; }
    @keyframes plUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .pl-grip { width: 40px; height: 4px; border-radius: 99px; background: var(--border); margin: 6px auto 2px; }
    .pl-stitle { font: 900 16px var(--font); color: var(--text-primary); text-align: center; padding: 12px 18px 8px; }
    .pl-srow { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; }
    .pl-srow:active { background: rgba(0,0,0,.04); }
    .pl-sic { width: 40px; height: 40px; border-radius: 50%; flex: none; display: grid; place-items: center; background: rgba(0,128,128,.12); color: var(--primary); }
    .pl-sic.mut { background: rgba(95,95,95,.10); color: var(--text-secondary); }
    .pl-stx { flex: 1; min-width: 0; }
    .pl-stx .a { font: 800 14.5px var(--font); color: var(--text-primary); }
    .pl-stx .b { font: 700 12px var(--font); color: var(--text-tertiary); margin-top: 1px; }
    .pl-schev { color: var(--text-tertiary); flex: none; display: inline-flex; }
    .pl-sdiv { height: 1px; background: var(--divider); margin: 0 20px; }
  </style>
</head>
<body>
  <div class="state-switch">
    <button data-st="new" onclick="setState('new')">New</button>
    <button data-st="partial" onclick="setState('partial')">Partial</button>
    <button data-st="full" onclick="setState('full')">Full</button>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" style="top:64px">🌙</button>

  <div class="screen-box">
    <div class="screen home">
      <div class="statusbar"><span>9:41</span><span>5G&nbsp;&nbsp;􀙇&nbsp;&nbsp;100%</span></div>
      <div class="home-header">
        <div class="hh-avatar" style="background-image:linear-gradient(135deg,#6a8caf,#33566f);cursor:pointer" onclick="location.href='profile.html'"></div>
        <div class="hh-greet"><div class="hi" id="hi">Good morning 👋</div><div class="nm">Ema William</div></div>
        <button class="hh-btn" onclick="location.href='activity.html'"><i data-icon="search" data-size="19"></i></button>
        <button class="hh-btn" id="bell" onclick="location.href='../notifications/notifications.html'"><i data-icon="bell" data-size="19"></i><span class="dot"></span></button>
      </div>
      <div class="scroll" id="content"></div>
    </div>
    <div class="bottom-nav">
      <a class="nav-item active"><span class="ic"><i data-icon="home" data-size="22"></i></span>Home</a>
      <a class="nav-item" href="challenges.html"><span class="ic"><i data-icon="trophy" data-size="22"></i></span>Challenges</a>
      <div class="nav-fab"><button onclick="CreateMenu.open()"><i data-icon="plus" data-size="26"></i></button></div>
      <a class="nav-item" href="activity.html"><span class="ic"><i data-icon="activity" data-size="22"></i></span>Activity</a>
      <a class="nav-item" href="profile.html"><span class="ic"><i data-icon="user" data-size="22"></i></span>Profile</a>
    </div>
  </div>

  <script src="../../js/components/dialog.js"></script>
  <script src="../../js/components/icons.js"></script>
  <script src="../../js/components/upload-banner.js"></script>
  <script src="../../js/components/create-menu.js"></script>
  <script src="../../js/screens/social-data.js"></script>
  <script src="../../js/screens/home-data.js"></script>
  <script src="../../js/screens/home-pro.js"></script>
  <script src="../../js/screens/community.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const H = HomeData, P = HomePro;
    function render(state) {
      const d = H.DATA[state];
      document.getElementById("hi").textContent = d.greeting;
      document.getElementById("bell").querySelector(".dot").style.display = d.bell ? "block" : "none";
      // V7 = V5 body + V6's bold streak-forward top section
      let h = P.aiPulse(state, d)            // TOP — clean separated CTA bar + streak card (less busy)
        + P.todayCard(state, d, "banner", { stats: true, addFirst: true }) // goal banner + distance/active + today's workouts (Start another first)
        + (state === "new" ? H.checklist() : "")
        + P.challengesPro(state, d)          // active challenges — ring progress + group chat
        + P.topActivities(state, d)          // Top activities — horizontal scroll · Top / Friends
        + Community.homeFeed(state);         // community — full-bleed immersive, multi-asset, tap → post detail
      document.getElementById("content").innerHTML = h;
      window.Icons.init(document.getElementById("content"));
      document.querySelectorAll(".state-switch button").forEach(b => b.classList.toggle("active", b.dataset.st === state));
    }
    function setState(s){ render(s); }

    render(new URLSearchParams(location.search).get("state") || "full");
  </script>
</body>
</html>
