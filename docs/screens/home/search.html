<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="teal" data-font="nunito">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Buzzend · Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/tokens.css" />
  <link rel="stylesheet" href="../../css/palettes.css" />
  <link rel="stylesheet" href="../../css/fonts.css" />
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../../css/screens/home.css" />
  <link rel="stylesheet" href="../../css/screens/search.css" />
</head>
<body>
  <div class="state-switch">
    <button data-v="search" onclick="setV('search')">Search</button>
    <button data-v="people" onclick="setV('people')">People</button>
    <button data-v="results" onclick="setV('results')">Challenges</button>
    <button data-v="empty" onclick="setV('empty')">No results</button>
    <button data-v="loading" onclick="setV('loading')">Loading</button>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" style="top:64px">🌙</button>

  <div class="screen-box">
    <div class="screen">
      <div class="statusbar"><span>9:41</span><span>5G&nbsp;&nbsp;·&nbsp;&nbsp;100%</span></div>
      <div class="sr-top">
        <div class="sr-bar">
          <button class="sr-back" onclick="history.length>1?history.back():location.href='discover.html'"><i data-icon="back" data-size="22"></i></button>
          <div class="sr-field">
            <i data-icon="search" data-size="18"></i>
            <input id="sr-input" type="text" placeholder="Search people & challenges" autocomplete="off" spellcheck="false" oninput="Search.onInput(this.value)" />
            <button class="sr-clear" id="sr-clear" onclick="Search.clearInput()"><i data-icon="x" data-size="14"></i></button>
          </div>
        </div>
        <div class="sr-tabs" id="sr-tabs"></div>
      </div>
      <div class="scroll sr-body" id="sr-body"></div>
    </div>
    <div class="bottom-nav">
      <a class="nav-item" href="home-v7.html"><span class="ic"><i data-icon="home" data-size="22"></i></span>Home</a>
      <a class="nav-item active" href="discover.html"><span class="ic"><i data-icon="trophy" data-size="22"></i></span>Challenges</a>
      <div class="nav-fab"><button onclick="location.href='../workout/moment.html'"><i data-icon="plus" data-size="26"></i></button></div>
      <a class="nav-item" href="activity.html"><span class="ic"><i data-icon="activity" data-size="22"></i></span>Activity</a>
      <a class="nav-item" href="profile.html"><span class="ic"><i data-icon="user" data-size="22"></i></span>Profile</a>
    </div>
  </div>

  <script src="../../js/components/dialog.js"></script>
  <script src="../../js/components/icons.js"></script>
  <script src="../../js/screens/social-data.js"></script>
  <script src="../../js/screens/search.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    window.Icons.init(document.querySelector(".sr-top"));
    Search.start();
    function setV(v) {
      Search.setState(v);
      document.querySelectorAll(".state-switch button").forEach(b => b.classList.toggle("active", b.dataset.v === v));
    }
    const _p = new URLSearchParams(location.search);
    if (_p.get("v")) setV(_p.get("v"));
  </script>
</body>
</html>
