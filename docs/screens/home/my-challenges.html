<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="teal" data-font="nunito">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Buzzend · Your challenges</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/tokens.css" />
  <link rel="stylesheet" href="../../css/palettes.css" />
  <link rel="stylesheet" href="../../css/fonts.css" />
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../../css/screens/home.css" />
  <link rel="stylesheet" href="../../css/screens/home-pro.css" />
  <link rel="stylesheet" href="../../css/screens/top-activities.css" />
  <link rel="stylesheet" href="../../css/screens/my-challenges.css" />
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme(); MyCh.render()">🌙</button>

  <div class="screen-box">
    <div class="screen">
      <div class="statusbar"><span>9:41</span><span>5G&nbsp;&nbsp;·&nbsp;&nbsp;100%</span></div>
      <div class="mc-top">
        <button class="mc-back" onclick="history.length>1?history.back():location.href='home-v7.html'"><i data-icon="back" data-size="22"></i></button>
        <div class="mc-title">Your challenges</div>
        <span class="mc-count" id="mc-count">0</span>
      </div>
      <div class="mc-search">
        <i data-icon="search" data-size="18"></i>
        <input id="mc-q" type="text" placeholder="Search for challenge name" autocomplete="off" spellcheck="false" oninput="MyCh.search(this.value)" />
        <button class="mc-qx" id="mc-qx" onclick="MyCh.clearQ()"><i data-icon="x" data-size="14"></i></button>
      </div>
      <div class="scroll" id="content" style="padding:0"></div>
    </div>
  </div>

  <script src="../../js/components/dialog.js"></script>
  <script src="../../js/components/icons.js"></script>
  <script src="../../js/screens/social-data.js"></script>
  <script src="../../js/screens/my-challenges.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    window.Icons.init(document.querySelector(".screen"));
    MyCh.start(document.getElementById("content"));
  </script>
</body>
</html>
