<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="teal" data-font="nunito">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Buzzend · Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/tokens.css" />
  <link rel="stylesheet" href="../../css/palettes.css" />
  <link rel="stylesheet" href="../../css/fonts.css" />
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../../css/screens/home.css" />
  <style>
    .up-top { display:flex; align-items:center; gap:8px; padding:8px 12px; }
    .up-back { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--surface); display:grid; place-items:center; color:var(--text-primary); cursor:pointer; }
    .up-wrap { display:flex; flex-direction:column; align-items:center; text-align:center; padding:70px 30px; }
    .up-av { width:104px; height:104px; border-radius:50%; background-size:cover; background-position:center; border:4px solid var(--bg-canvas); box-shadow:0 6px 20px rgba(0,0,0,.15); }
    .up-nm { font:900 22px var(--font); color:var(--text-primary); margin-top:16px; }
    .up-hd { font:700 13px var(--font); color:var(--text-tertiary); margin-top:3px; }
    .up-badge { display:inline-flex; align-items:center; gap:7px; margin-top:26px; background:color-mix(in srgb,var(--primary) 12%,transparent); color:var(--primary); font:800 13px var(--font); padding:10px 16px; border-radius:99px; }
    .up-d { font:600 13.5px var(--font); color:var(--text-secondary); margin-top:16px; line-height:1.55; max-width:280px; }
    .up-cta { margin-top:26px; display:flex; gap:10px; }
    .up-btn { height:46px; border-radius:13px; border:none; padding:0 22px; font:800 14px var(--font); cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
    .up-btn.primary { background:var(--primary); color:var(--on-primary); box-shadow:var(--shadow-btn); }
    .up-btn.ghost { background:var(--surface-alt); color:var(--text-primary); border:1px solid var(--border); }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme(); paint()">🌙</button>
  <div class="screen-box">
    <div class="screen">
      <div class="statusbar"><span>9:41</span><span>5G&nbsp;&nbsp;·&nbsp;&nbsp;100%</span></div>
      <div class="up-top"><button class="up-back" onclick="history.length>1?history.back():location.href='community.html'"><i data-icon="back" data-size="22"></i></button></div>
      <div class="up-wrap" id="wrap"></div>
    </div>
  </div>
  <script src="../../js/components/dialog.js"></script>
  <script src="../../js/components/icons.js"></script>
  <script src="../../js/screens/social-data.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const name = new URLSearchParams(location.search).get("name") || "Buzzend member";
    const p = (window.Social.PEOPLE || []).find(x => x.name === name) || { name, av: "#9aa6b2,#6b7683", initials: name.slice(0,2).toUpperCase() };
    function paint() {
      document.getElementById("wrap").innerHTML =
        `<div class="up-av" style="background-image:${window.Social.grad(p.av)}"></div>
         <div class="up-nm">${p.name}</div><div class="up-hd">@${p.name.split(" ")[0].toLowerCase()}</div>
         <div class="up-badge">${window.Icons.svg("rocket",15)} Profile coming soon</div>
         <div class="up-d">${p.name.split(" ")[0]}'s full profile — workouts, challenges and posts — is on the way. You'll be able to follow and message them here soon.</div>
         <div class="up-cta">
           <button class="up-btn primary" onclick="Buzzend.alert({icon:'success',title:'Following',message:'You are now following ${p.name}.'})">${window.Icons.svg("plus",15)} Follow</button>
           <button class="up-btn ghost" onclick="location.href='../chat/chat-detail.html'">${window.Icons.svg("comment",15)} Message</button>
         </div>`;
      window.Icons.init(document.getElementById("wrap"));
    }
    window.Icons.init(document.querySelector(".up-top"));
    paint();
  </script>
</body>
</html>
