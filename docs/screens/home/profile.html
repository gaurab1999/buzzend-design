<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="teal" data-font="nunito">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Buzzend · Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/tokens.css" />
  <link rel="stylesheet" href="../../css/palettes.css" />
  <link rel="stylesheet" href="../../css/fonts.css" />
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../../css/screens/home.css" />
  <link rel="stylesheet" href="../../css/screens/profile.css" />
  <style>
    .pf-ctl { position:fixed; top:58px; left:50%; transform:translateX(-50%); z-index:60; display:flex; gap:8px; align-items:center; }
    .pf-ctl select { font:800 12px var(--font); border:1px solid var(--border); background:var(--surface); color:var(--text-primary);
      border-radius:99px; padding:7px 12px; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.12); }
  </style>
</head>
<body>
  <div class="state-switch">
    <button data-v="1" onclick="setV('1')">Hero</button>
    <button data-v="2" onclick="setV('2')">Card</button>
    <button data-v="3" onclick="setV('3')">Minimal</button>
  </div>
  <div class="pf-ctl">
    <select id="scen" onchange="setScen(this.value)" title="Whose profile / state">
      <option value="me">Your profile</option>
      <option value="friend">Friend (following)</option>
      <option value="followback">Follows you (follow back)</option>
      <option value="stranger">Other user</option>
      <option value="newuser">New user (empty)</option>
      <option value="blocked">Blocked user</option>
    </select>
    <button class="theme-toggle" onclick="toggleTheme()" style="position:static;box-shadow:0 4px 14px rgba(0,0,0,.12)">🌙</button>
  </div>

  <div class="screen-box">
    <div class="screen">
      <div class="statusbar"><span>9:41</span><span>5G&nbsp;&nbsp;·&nbsp;&nbsp;100%</span></div>
      <div class="scroll pf-scroll" id="content"></div>
    </div>
    <div class="bottom-nav">
      <a class="nav-item" href="home-v7.html"><span class="ic"><i data-icon="home" data-size="22"></i></span>Home</a>
      <a class="nav-item" href="challenges.html"><span class="ic"><i data-icon="trophy" data-size="22"></i></span>Challenges</a>
      <div class="nav-fab"><button onclick="location.href='../workout/moment.html'"><i data-icon="plus" data-size="26"></i></button></div>
      <a class="nav-item" href="activity.html"><span class="ic"><i data-icon="activity" data-size="22"></i></span>Activity</a>
      <a class="nav-item active"><span class="ic"><i data-icon="user" data-size="22"></i></span>Profile</a>
    </div>
  </div>

  <script src="../../js/components/dialog.js"></script>
  <script src="../../js/components/icons.js"></script>
  <script src="../../js/components/upload-banner.js"></script>
  <script src="../../js/screens/social-data.js"></script>
  <script src="../../js/screens/profile.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const _p = new URLSearchParams(location.search);
    // ?user=<name> from other screens → resolve to a scenario; default own profile
    const scenParam = _p.get("scenario") || (_p.get("user") ? "friend" : "me");
    let curV = _p.get("v") || "1";
    const content = document.getElementById("content");
    function paint() { document.querySelectorAll(".state-switch button").forEach(b => b.classList.toggle("active", b.dataset.v === curV)); }
    function setV(v) { curV = v; Profile.setV(v); paint(); }
    function setScen(s) { Profile.setScenario(s); }
    document.getElementById("scen").value = scenParam;
    Profile.start(content, curV, scenParam, _p.get("tab"));
    paint();
  </script>
</body>
</html>
