<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="teal" data-font="nunito">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Buzzend · Huddle · Conversation</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/tokens.css" />
  <link rel="stylesheet" href="../../css/palettes.css" />
  <link rel="stylesheet" href="../../css/fonts.css" />
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../../css/screens/chat.css" />
  <link rel="stylesheet" href="../../css/screens/chat-concepts.css" />
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" style="top:14px">🌙</button>
  <div class="screen-box">
    <div class="hd-screen">
      <div class="statusbar"><span>9:41</span><span>5G&nbsp;&nbsp;􀙇&nbsp;&nbsp;100%</span></div>
      <div class="hd-cbar" id="bar"></div>
      <div class="hd-body" id="body"></div>
      <div class="hd-inwrap">
        <div class="hd-quickcheer" id="quick"></div>
        <div class="hd-input">
          <button class="rnd hl" onclick="shareRep()" title="Share a workout"><i data-icon="activity" data-size="20"></i></button>
          <div class="field"><textarea id="ta" rows="1" placeholder="Message the team…"></textarea></div>
          <button class="send" onclick="send()"><i data-icon="send" data-size="20"></i></button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../js/components/dialog.js"></script>
  <script src="../../js/components/icons.js"></script>
  <script src="../../js/screens/social-data.js"></script>
  <script src="../../js/screens/chat-data.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const C = window.Chat, ME="Ema William";
    const id = new URLSearchParams(location.search).get("id") || "sq30";
    const conv = C.byId(id) || C.groups()[0];
    const grp = conv.kind==="group";
    const esc = s => (s||"").replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
    let uid=0;
    // build combined item list (messages + woven activity events)
    let items = conv.msgs.map(m=>({...m}));
    if (grp && C.EVENTS[id]){
      const evs = C.EVENTS[id].map(e=>({t:"event", id:"e"+(++uid), actor:e.actor, action:e.action, pts:e.pts, icon:e.icon||"💪", cheers:{...e.cheers}, _on:{}, ts:e.ts}));
      items.splice(Math.min(3,items.length),0,...evs);
    }
    const nameColor = n=>{ const c=["#e0922a","#7c5ce0","#2a9d8f","#c0398e","#3b6eff","#ef4444"]; let s=0; for(const ch of n)s+=ch.charCodeAt(0); return c[s%c.length]; };

    function bar(){
      const el=document.getElementById("bar");
      if (grp){
        el.innerHTML = `<div class="hd-cbar-top">
          <button class="ic-btn" onclick="location.href='huddle-list.html'"><i data-icon="back" data-size="22"></i></button>
          <div class="peer"><div class="av" style="background-image:${C.grad(conv.cover)}"></div>
            <div style="min-width:0"><div class="nm">${esc(conv.name)}</div>
            <div class="st"><span style="color:var(--green-deep)">●</span> ${conv.active} in the huddle now</div></div></div>
          <button class="ic-btn"><i data-icon="more-vertical" data-size="22"></i></button></div>
          <div class="hd-prog"><div class="pl"><span>Team goal · Day 12 of 30</span><span class="live"><i></i> ${conv.active} logging</span></div>
            <div class="track"><i style="width:62%"></i></div>
            <div class="pl" style="margin:5px 0 0"><b>62% there</b><span>4,880 / 7,875 reps</span></div></div>`;
      } else {
        const p=C.person(conv.who), on=p.online;
        el.innerHTML = `<div class="hd-cbar-top">
          <button class="ic-btn" onclick="location.href='huddle-list.html'"><i data-icon="back" data-size="22"></i></button>
          <div class="peer"><div class="av rnd" style="background-image:${p.av}">${p.initials}${on?'<span class="dot"></span>':''}</div>
            <div style="min-width:0"><div class="nm">${esc(p.name)}</div>
            <div class="st">${on?'Online now':'Last seen 8:12 AM'}</div></div></div>
          <button class="ic-btn"><i data-icon="more-vertical" data-size="22"></i></button></div>`;
      }
      window.Icons.init(el);
    }

    function eventHtml(e){
      const cheers = Object.keys(e.cheers).map(em=>`<button class="hd-cheer ${e._on[em]?'on':''}" onclick="cheerEvent('${e.id}','${em}',event)">${em} ${e.cheers[em]}</button>`).join("");
      return `<div class="hd-event"><div class="row">
          <div class="ic">${e.icon}</div>
          <div class="tx"><b>${esc(e.actor==="You"?"You":C.person(e.actor).name.split(' ')[0])}</b> ${esc(e.action)}<div class="sub">${e.ts}</div></div>
          <div class="pts">+${e.pts}</div></div>
        <div class="cheers">${cheers}<button class="hd-cheer add" onclick="cheerEvent('${e.id}','🔥',event)"><i data-icon="plus" data-size="13"></i></button></div></div>`;
    }
    function reactsHtml(m){ if(!m.react||!Object.keys(m.react).length) return "";
      return `<div class="hd-reacts">`+C.reactList(m.react).map(r=>`<span class="hd-chip ${r.by.includes(ME)?'mine':''}" onclick="toggleReact('${m.id}','${r.emoji}')">${r.emoji}${r.by.length>1?' '+r.by.length:''}</span>`).join("")+`</div>`;
    }
    function msgHtml(m,prev,next){
      if (m.t==="system") return `<div class="cd-sys">${esc(m.text)}</div>`;
      const me=m.from==="me"; const p=me?null:C.person(m.from);
      const firstOfRun=!prev||prev.from!==m.from||prev.t!=="text"&&prev.t!=="emoji"&&prev.t!=="image"||prev.t==="event"||prev.t==="system";
      const lastOfRun=!next||next.from!==m.from||next.t==="event"||next.t==="system";
      const sender=(!me&&grp&&firstOfRun)?`<div class="hd-sender" style="color:${nameColor(m.from)}">${esc(p.name)}</div>`:"";
      const av=me?"":`<div class="sav ${lastOfRun?'':'hidden'}" style="background-image:${p.av}">${lastOfRun?p.initials:''}</div>`;
      let inner;
      if (m.t==="emoji") inner=`<div style="font-size:40px;line-height:1;padding:2px 4px">${esc(m.text)}</div>`;
      else if (m.t==="image") inner=`<div class="hd-bub" style="padding:4px"><div style="width:190px;height:190px;border-radius:14px;background-image:${C.grad(m.img)};background-size:cover"></div>${m.caption?`<div style="padding:6px 6px 2px;font-size:13.5px">${esc(m.caption)}</div>`:""}</div>`;
      else if (m.t==="gif") inner=`<div class="hd-bub" style="padding:4px"><div style="width:190px;height:190px;border-radius:14px;background-image:${C.grad(m.img)};background-size:cover;position:relative"><span style="position:absolute;left:8px;top:8px;background:rgba(0,0,0,.55);color:#fff;font:900 10px var(--font);padding:3px 7px;border-radius:6px">GIF</span></div></div>`;
      else inner=`<div class="hd-bub">${esc(m.text)}</div>`;
      const foot=lastOfRun?`<div class="hd-foot"><span class="tm">${m.ts}</span>${m.from==="me"&&m.status==="seen"?`<span class="tick">${Icons.svg('checks',14)}</span>`:""}</div>`:"";
      return `<div class="hd-msg ${me?'me':'them'}">${av}<div class="hd-stack">${sender}${inner}${reactsHtml(m)}${foot}</div></div>`;
    }

    function render(){
      const body=document.getElementById("body");
      let h="";
      if (!grp) h += vsStrip();
      h += `<div class="cd-date">Today</div>`;
      items.forEach((m,i)=>{ h += m.t==="event" ? eventHtml(m) : msgHtml(m, items[i-1], items[i+1]); });
      body.innerHTML=h; window.Icons.init(body); body.scrollTop=body.scrollHeight;
    }
    function vsStrip(){
      const meR=C.weekReps(ME), thR=C.weekReps(conv.who); const max=Math.max(meR,thR,1);
      const win = meR>=thR?"You're ahead 💪":`${C.person(conv.who).name.split(' ')[0]} leads`;
      return `<div class="hd-vs"><div class="hh"><span class="lbl">THIS WEEK · REPS</span><span class="win">${win}</span></div>
        <div class="bars"><div class="side"><div class="n"><span>You</span><b>${meR}</b></div><div class="tr me"><i style="width:${Math.round(meR/max*100)}%"></i></div></div>
          <span class="swords">⚔️</span>
          <div class="side"><div class="n"><span>${esc(C.person(conv.who).name.split(' ')[0])}</span><b>${thR}</b></div><div class="tr them"><i style="width:${Math.round(thR/max*100)}%"></i></div></div></div></div>`;
    }

    function quick(){ document.getElementById("quick").innerHTML =
      C.CHEERS.map(e=>`<button onclick="sendCheer('${e}',event)">${e}</button>`).join(""); }

    function toggleReact(mid,e){ const m=items.find(x=>x.id===mid); if(!m)return; m.react=m.react||{};
      const had=!!(m.react[e]&&m.react[e].includes(ME));
      Object.keys(m.react).forEach(k=>{ m.react[k]=m.react[k].filter(n=>n!==ME); if(!m.react[k].length)delete m.react[k]; });
      if(!had) m.react[e]=(m.react[e]||[]).concat(ME); render(); }
    function cheerEvent(eid,em,ev){ const e=items.find(x=>x.id===eid); if(!e)return;
      e._on[em]=!e._on[em]; e.cheers[em]=(e.cheers[em]||0)+(e._on[em]?1:-1); if(e.cheers[em]<=0)delete e.cheers[em];
      if(e._on[em]) burst(em,ev); render(); }
    function send(){ const ta=document.getElementById("ta"); const v=(ta.value||"").trim(); if(!v)return;
      const isE=/^\p{Extended_Pictographic}{1,3}$/u.test(v);
      items.push({id:"m"+(++uid),from:"me",t:isE?"emoji":"text",text:v,ts:"9:41 AM",status:"seen"}); ta.value=""; render(); }
    function sendCheer(e,ev){ items.push({id:"m"+(++uid),from:"me",t:"emoji",text:e,ts:"9:41 AM",status:"seen"}); if(ev)burst(e,ev); render(); }
    function shareRep(){ items.push({t:"event",id:"e"+(++uid),actor:"You",action:"logged 32 squats",pts:192,icon:"🏋️",cheers:{},_on:{},ts:"9:41 AM"}); render();
      Buzzend.alert&&null; }
    function burst(emoji,ev){ const b=document.createElement("div"); b.className="hd-burst"; b.textContent=emoji;
      const box=document.querySelector(".screen-box").getBoundingClientRect();
      const x=ev&&ev.clientX?ev.clientX-box.left:200, y=ev&&ev.clientY?ev.clientY-box.top:400;
      b.style.left=x+"px"; b.style.top=y+"px"; document.querySelector(".screen-box").appendChild(b); setTimeout(()=>b.remove(),900); }

    bar(); quick(); render();
  </script>
</body>
</html>
