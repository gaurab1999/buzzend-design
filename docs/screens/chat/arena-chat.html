<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="teal" data-font="nunito">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Buzzend · Arena · Conversation</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/tokens.css" />
  <link rel="stylesheet" href="../../css/palettes.css" />
  <link rel="stylesheet" href="../../css/fonts.css" />
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../../css/screens/chat.css" />
  <link rel="stylesheet" href="../../css/screens/chat-concepts.css" />
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" style="top:14px">🌙</button>
  <div class="screen-box">
    <div class="ar-cscreen">
      <div class="statusbar"><span>9:41</span><span>5G&nbsp;&nbsp;􀙇&nbsp;&nbsp;100%</span></div>
      <div class="ar-cbar" id="bar"></div>
      <div class="ar-body" id="body"></div>
      <div class="ar-inwrap">
        <div class="ar-quick" id="quick"></div>
        <div class="ar-input">
          <button class="rnd"><i data-icon="plus" data-size="22"></i></button>
          <div class="field"><textarea id="ta" rows="1" placeholder="Talk some smack…"></textarea></div>
          <button class="send" onclick="send()"><i data-icon="send" data-size="20"></i></button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../js/components/icons.js"></script>
  <script src="../../js/screens/social-data.js"></script>
  <script src="../../js/screens/chat-data.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const C=window.Chat, ME="Ema William";
    const id=new URLSearchParams(location.search).get("id")||"sq30";
    const conv=C.byId(id)||C.groups()[0];
    const grp=conv.kind==="group";
    const esc=s=>(s||"").replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
    let msgs=conv.msgs.map(m=>({...m})); let uid=0;
    const RANKS={}; // member → rank for rank pills
    (conv.memberNames||[]).forEach((n,i)=>RANKS[n]=i+1); RANKS["Ema William"]=4;
    const nameColor=n=>{const c=["#e0922a","#7c5ce0","#2a9d8f","#c0398e","#3b6eff","#ef4444"];let s=0;for(const ch of n)s+=ch.charCodeAt(0);return c[s%c.length];};

    function bar(){
      const el=document.getElementById("bar");
      if(grp){
        // mini leaderboard: top members by (faked) reps
        const board=(conv.memberNames||[]).slice(0,4).map((n,i)=>({n,v:1200-i*180}));
        board.splice(2,0,{n:"Ema William",v:840,me:true});
        const slots=board.slice(0,5).map((b,i)=>`<div class="ar-slot ${b.me?'me':''}"><div class="r">${i+1===1?'🥇':i+1===2?'🥈':i+1===3?'🥉':'#'+(i+1)}</div>
          <div class="av" style="background-image:${C.person(b.n).av}"></div><div class="n">${esc(b.me?'You':C.person(b.n).name.split(' ')[0])}</div><div class="v">${b.v}</div></div>`).join("");
        el.innerHTML=`<div class="ar-cbar-top">
          <button class="ic" onclick="location.href='arena-list.html'"><i data-icon="back" data-size="22"></i></button>
          <div class="peer"><div class="nm">${esc(conv.name)} 🏆</div><div class="st">${conv.members} competing · Day 12/30</div></div>
          <button class="ic"><i data-icon="more-vertical" data-size="22"></i></button></div>
          <div class="ar-board">${slots}</div>`;
      } else {
        const p=C.person(conv.who);
        el.innerHTML=`<div class="ar-cbar-top">
          <button class="ic" onclick="location.href='arena-list.html'"><i data-icon="back" data-size="22"></i></button>
          <div class="peer"><div class="nm">${esc(p.name)} ⚔️</div><div class="st">Your rival · this week</div></div>
          <button class="ic"><i data-icon="more-vertical" data-size="22"></i></button></div>`;
      }
      window.Icons.init(el);
    }
    function vsStrip(){
      const meR=C.weekReps(ME), thR=C.weekReps(conv.who);
      return `<div class="ar-vs"><div class="hh">HEAD TO HEAD · THIS WEEK</div>
        <div class="row"><div class="p"><div class="av" style="background-image:linear-gradient(135deg,#6a8caf,#33566f)"></div><div class="nm">You</div></div>
          <div class="mid"><div class="s">${meR}</div><div class="l">REPS</div></div>
          <span class="sword">⚔️</span>
          <div class="mid"><div class="s">${thR}</div><div class="l">REPS</div></div>
          <div class="p"><div class="nm">${esc(C.person(conv.who).name.split(' ')[0])}</div><div class="av" style="background-image:${C.person(conv.who).av}"></div></div></div></div>`;
    }
    function reactsHtml(m){ if(!m.react||!Object.keys(m.react).length)return "";
      return `<div class="ar-reacts">`+C.reactList(m.react).map(r=>`<span class="ar-chip ${r.by.includes(ME)?'mine':''}" onclick="toggleReact('${m.id}','${r.emoji}')">${r.emoji}${r.by.length>1?' '+r.by.length:''}</span>`).join("")+`</div>`; }
    function msgHtml(m,prev,next){
      if(m.t==="system") return `<div class="ar-drop">🎯 ${esc(m.text)}</div>`;
      const me=m.from==="me", p=me?null:C.person(m.from);
      const firstOfRun=!prev||prev.from!==m.from||prev.t==="system";
      const lastOfRun=!next||next.from!==m.from||next.t==="system";
      const rk=grp&&!me?RANKS[m.from]:null;
      const pill=rk?`<span class="ar-rankpill ${rk<=3?'top':''}">${rk===1?'🥇':rk===2?'🥈':rk===3?'🥉':'#'+rk}</span>`:"";
      const sender=(!me&&grp&&firstOfRun)?`<div class="ar-sender" style="color:${nameColor(m.from)}">${esc(p.name)}${pill}</div>`:"";
      const av=me?"":`<div class="sav ${lastOfRun?'':'hidden'}" style="background-image:${p.av}">${lastOfRun?p.initials:''}</div>`;
      let inner;
      if(m.t==="emoji") inner=`<div style="font-size:40px;line-height:1;padding:2px 4px">${esc(m.text)}</div>`;
      else if(m.t==="image"||m.t==="gif") inner=`<div class="ar-bub" style="padding:4px"><div style="width:180px;height:180px;border-radius:12px;background-image:${C.grad(m.img)};background-size:cover"></div>${m.caption?`<div style="padding:6px 4px 2px;font-size:13px">${esc(m.caption)}</div>`:""}</div>`;
      else if(m.deleted) inner=`<div class="ar-bub" style="opacity:.6;font-style:italic">Message deleted</div>`;
      else inner=`<div class="ar-bub">${esc(m.text)}</div>`;
      const foot=lastOfRun?`<div class="ar-foot"><span class="tm">${m.ts}</span>${me&&m.status==='seen'?`<span style="color:var(--secondary);display:inline-flex">${Icons.svg('checks',14)}</span>`:""}</div>`:"";
      return `<div class="ar-msg ${me?'me':'them'}">${av}<div class="ar-stack">${sender}${inner}${reactsHtml(m)}${foot}</div></div>`;
    }
    function render(){ const body=document.getElementById("body"); let h="";
      if(!grp) h+=vsStrip();
      if(grp) h+=`<div class="ar-drop">🥇 Ravi took the lead — 40 squats!</div>`;
      msgs.forEach((m,i)=>h+=msgHtml(m,msgs[i-1],msgs[i+1]));
      body.innerHTML=h; window.Icons.init(body); body.scrollTop=body.scrollHeight;
    }
    function quick(){ document.getElementById("quick").innerHTML=["🔥","💪","😤","😂","🏆","👀"].map(e=>`<button onclick="react('${e}')">${e}</button>`).join(""); }
    function toggleReact(mid,e){ const m=msgs.find(x=>x.id===mid); if(!m)return; m.react=m.react||{};
      const had=!!(m.react[e]&&m.react[e].includes(ME));
      Object.keys(m.react).forEach(k=>{ m.react[k]=m.react[k].filter(n=>n!==ME); if(!m.react[k].length)delete m.react[k]; });
      if(!had) m.react[e]=(m.react[e]||[]).concat(ME); render(); }
    function react(e){ const last=[...msgs].reverse().find(m=>m.from!=="me"&&m.t!=="system"); if(last)toggleReact(last.id,e); }
    function send(){ const ta=document.getElementById("ta"); const v=(ta.value||"").trim(); if(!v)return;
      const isE=/^\p{Extended_Pictographic}{1,3}$/u.test(v);
      msgs.push({id:"m"+(++uid),from:"me",t:isE?"emoji":"text",text:v,ts:"9:41 AM",status:"seen"}); ta.value=""; render(); }
    bar(); quick(); render();
  </script>
</body>
</html>
